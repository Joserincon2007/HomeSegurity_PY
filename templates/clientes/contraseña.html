<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña | homeSegurity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #021024 0%, #0c356a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .change-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            width: 100%;
            max-width: 450px;
            color: #1a1a1a; /* Texto negro */
        }
        .btn-home {
            background-color: #0c356a;
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-home:hover {
            background-color: #052659;
        }
    </style>
</head>
<body>

<div class="change-card">
    <div class="text-center mb-4">
        <h2 style="color: #021024; font-weight: 700;">Seguridad</h2>
        <p class="text-muted">Actualiza tu contraseña de acceso</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

        <form action="{{ url_for('admin.procesar_cambio_password') }}" method="POST">
            <div class="mb-3">
            <label class="form-label fw-bold">Contraseña Actual</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input type="password" name="pass_actual" class="form-control" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Nueva Contraseña</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-shield-plus"></i></span>
                <input type="password" name="pass_nueva" class="form-control" minlength="6" required>
            </div>
            <div class="form-text text-muted">Mínimo 6 caracteres alfanuméricos.</div>
        </div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-home">Actualizar Contraseña</button>
            <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
