<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Credenciales | InmoApp</title>
    
    <style>
        :root {
            /* Tonalidades Azules Formales */
            --bg-gradient: linear-gradient(135deg, #0a192f 0%, #112240 100%);
            --primary-dark: #0a192f;
            --secondary-blue: #172a45;
            --accent-blue: #30475e;
            --text-main: #2d3748;
            --text-muted: #718096;
            --success-green: #2ecc71;
            --border-color: #edf2f7;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Contenedor del Formulario */
        .container {
            width: 90%;
            max-width: 550px;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            color: var(--primary-dark);
            text-align: center;
            margin: 0 0 10px 0;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-blue);
            background-color: #f8fafc;
        }

        h3 {
            font-size: 0.85rem;
            color: var(--accent-blue);
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Tarjetas de Selección de Cargo */
        .cards {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .card {
            flex: 1;
            border: 2px solid var(--border-color);
            padding: 15px 5px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--accent-blue);
            font-size: 0.85rem;
        }

        .card:hover {
            border-color: var(--secondary-blue);
            background: #f1f5f9;
        }

        .card.selected {
            border-color: var(--primary-dark);
            background: var(--primary-dark);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(10, 25, 47, 0.2);
        }

        button[type="submit"] {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button[type="submit"]:hover {
            background: #1d3557;
            transform: translateY(-1px);
        }

        /* --- Estilos de la Ventana Emergente (Modal) --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 25, 47, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            width: 90%;
            max-width: 400px;
            text-align: center;
            animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-x {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            color: #cbd5e0;
            cursor: pointer;
            line-height: 1;
        }

        .close-x:hover { color: var(--primary-dark); }

        .modal-icon {
            width: 60px;
            height: 60px;
            background: #dcfce7;
            color: var(--success-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin: 0 auto 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Solicitud de Acceso</h2>
    <p class="subtitle">Complete los datos para obtener sus credenciales</p>
    
    <form id="formSolicitud" method="POST" action="{{ url_for('auth.solicitar_admin') }}">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido" placeholder="Apellido" required>
        <input type="email" name="correo" placeholder="Correo electrónico" required>

        <h3>Seleccione su cargo</h3>
        <div class="cards">
            <div class="card" onclick="selectCargo(this,'PERITO')">Perito</div>
            <div class="card" onclick="selectCargo(this,'AGENTE')">Agente</div>
            <div class="card" onclick="selectCargo(this,'ADMIN')">Admin</div>
        </div>

        <input type="hidden" name="cargo" id="cargo" required>
        <button type="submit">Enviar Solicitud</button>
    </form>
</div>

<div id="modalSuccess" class="modal-overlay">
    <div class="modal-box">
        <span class="close-x" onclick="cerrarModal()">&times;</span>
        <div class="modal-icon">✓</div>
        <h2 style="margin-bottom: 10px;">¡Enviado con éxito!</h2>
        <p style="color: var(--text-muted); line-height: 1.6;">
            Tu solicitud ha sido registrada. El administrador revisará tus datos y recibirás una notificación por correo.
        </p>
        <button onclick="cerrarModal()" style="margin-top: 20px; width: auto; padding: 12px 35px; background: var(--success-green);">Aceptar</button>
    </div>
</div>

<script>
    // 1. Lógica de selección de tarjetas
    function selectCargo(element, cargo) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
        element.classList.add('selected');
        document.getElementById('cargo').value = cargo;
    }

    // 2. Funciones para controlar el Modal
    function mostrarModal() {
        const modal = document.getElementById('modalSuccess');
        if(modal) modal.style.display = 'flex';
    }

    function cerrarModal() {
        const modal = document.getElementById('modalSuccess');
        if(modal) modal.style.display = 'none';
    }

    // 3. INTEGRACIÓN CON FLASK (Solución al error de declaración)
    // Usamos comillas para que el editor lo vea como un String hasta que Flask lo procese
    const rawMessages = '{{ get_flashed_messages() | join(",") }}';

    // Si el string contiene nuestro mensaje, disparamos el modal
    if (rawMessages.includes('success_modal')) {
        window.addEventListener('load', () => {
            mostrarModal();
        });
    }

    // 4. Cerrar al hacer clic fuera del recuadro blanco
    window.onclick = function(event) {
        let modal = document.getElementById('modalSuccess');
        if (event.target == modal) {
            cerrarModal();
        }
    }
</script>

</body>
</html>
