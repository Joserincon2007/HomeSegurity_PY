<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Avalúo - homeSegurity</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-header-formal {
            background: linear-gradient(135deg, #001f3f 0%, #003366 100%);
            color: white;
            border-bottom: 4px solid #00d4ff;
        }
        .btn-azul-profundo {
            background-color: #001f3f;
            color: white;
            transition: 0.3s;
        }
        .btn-azul-profundo:hover {
            background-color: #003366;
            color: white;
            transform: translateY(-2px);
        }
        .form-label { font-weight: 600; color: #001f3f; }
        .section-title {
            border-left: 5px solid #00d4ff;
            padding-left: 10px;
            margin-bottom: 20px;
            color: #003366;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="card shadow-lg border-0">
                
                <div class="card-header card-header-formal py-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="mb-0"><i class="bi bi-calculator-fill me-2"></i>Registro Técnico de Avalúo</h3>
                        <span class="badge bg-light text-dark">Módulo de Perito</span>
                    </div>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form action="{{ url_for('avaluos.crear_manual') }}" method="POST">
                        
                        <div class="section-title text-uppercase">Vinculación con el Sistema</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">ID Vivienda (Referencia Catastral)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-house"></i></span>
                                    <input type="number" name="id_vivienda" class="form-control" placeholder="Ej: 502" required>
                                </div>
                            </div>

                            <div class="col-md-6">
    <label class="form-label fw-bold">Asignar Perito Responsable</label>
 <select name="id_perito" class="form-select" required>
    <option value="">Seleccione un perito...</option>
    {% for p in perito %}  <option value="{{ p.id_perito }}">ID: {{ p.id_perito }}</option>
    {% endfor %}
</select>
</div>
                            <div class="col-md-6">
                                <label class="form-label">Asignar a Usuario Propietario</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="bi bi-person-badge"></i></span>
                                    <select name="id_usuario" class="form-select" required>
                                        <option value="">Seleccione un usuario...</option>
                                        {% for u in usuarios %}
                                            <option value="{{ u.idUsuario }}">{{ u.primerNombre }} {{ u.primerApellido }}</option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="section-title text-uppercase">Información del Solicitante Externo</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label">Nombre del Solicitante</label>
                                <input type="text" name="solicitante" class="form-control" placeholder="Nombre completo">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Correo de Contacto</label>
                                <input type="email" name="correo" class="form-control" placeholder="ejemplo@correo.com">
                            </div>
                        </div>

                        <div class="section-title text-uppercase">Detalles Técnicos y Costos</div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <label class="form-label">Área del Inmueble (m²)</label>
                                <input type="number" step="0.01" name="area_m2" id="area" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Precio por m² ($)</label>
                                <input type="number" step="0.01" name="precio_m2" id="precio" class="form-control" placeholder="0.00" required oninput="calcularAvaluo()">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Valor Total del Avalúo</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light fw-bold">$</span>
                                    <input type="number" step="0.01" name="valor_total" id="total" class="form-control bg-light fw-bold text-primary" readonly>
                                </div>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">Ubicación / Localidad</label>
                                <input type="text" name="localidad" class="form-control" placeholder="Barrio o Localidad" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Antigüedad (Años)</label>
                                <input type="number" name="antiguedad" class="form-control" placeholder="Años">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">Estrato Social</label>
                                <select name="estrato" class="form-select">
                                    {% for i in range(1, 7) %}
                                        <option value="{{ i }}">{{ i }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row g-3 mb-4 align-items-center">
                            <div class="col-md-4">
                                <div class="form-check form-switch card p-3 shadow-sm border-0">
                                    <input class="form-check-input ms-0 me-2" type="checkbox" name="parqueadero" id="parqueadero">
                                    <label class="form-check-label fw-bold" for="parqueadero">¿Incluye Parqueadero?</label>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label">Observaciones Adicionales</label>
                                <textarea name="descripcion" class="form-control" rows="2" placeholder="Notas sobre el estado del inmueble..."></textarea>
                            </div>
                        </div>

                        <div class="col-md-4">
    <label class="form-label fw-bold">¿Cuenta con Parqueadero?</label>
    <div class="input-group">
        <span class="input-group-text bg-white"><i class="bi bi-p-square"></i></span>
        <select name="parqueaderos" class="form-select">
            <option value="1">Sí, incluye parqueadero</option>
            <option value="0" selected>No incluye parqueadero</option>
        </select>
    </div>
</div>

                        <hr class="my-4">
                        <div class="d-flex justify-content-end gap-3">
                            <a href="{{ url_for('avaluos.listar_perito') }}" class="btn btn-outline-secondary px-4">
                                <i class="bi bi-arrow-left"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-azul-profundo px-5 shadow">
                                <i class="bi bi-cloud-arrow-up me-2"></i> Guardar Avalúo
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function calcularAvaluo() {
        const area = parseFloat(document.getElementById('area').value) || 0;
        const precio = parseFloat(document.getElementById('precio').value) || 0;
        const totalInput = document.getElementById('total');
        
        const total = (area * precio).toFixed(2);
        totalInput.value = total;
    }
</script>
</body>
</html>
